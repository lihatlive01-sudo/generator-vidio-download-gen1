<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Streaming Player</title>
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: #000;
  font-family: Arial, sans-serif;
  overflow: hidden;
  position: relative;
}

/* Wrapper untuk kontrol aspect ratio */
.player-wrapper {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  position: relative;
  z-index: 50;
}

#video-player {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

/* Plyr container */
.plyr {
  width: 100%;
  height: 100%;
  position: relative;
  z-index: 100;
}

/* Video element fit */
.plyr video {
  object-fit: contain !important;
  width: 100%;
  height: 100%;
}

/* Style untuk tombol download custom */
.plyr__controls #custom-download-btn {
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  background: #00b3ff !important;
  color: white !important;
  font-size: 14px;
  padding: 8px 12px !important;
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.3s;
  margin-left: 4px;
}
.plyr__controls #custom-download-btn:hover {
  background: #0095d9 !important;
}

/* Sembunyikan konteks menu download bawaan browser */
video::-webkit-media-controls-download-button {
  display: none !important;
}
video::-webkit-media-controls-enclosure {
  overflow: hidden;
}

/* ============================================
   ADBLOCK DETECTION LAYER (Layer 1 - z-index: 1)
   ============================================ */
.adblock-message {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #1a0a2e 0%, #16213e 100%);
  z-index: 1;
  text-align: center;
  padding: 40px;
}

.adblock-message h2 {
  font-size: 32px;
  margin-bottom: 15px;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 700;
}

.adblock-message p {
  font-size: 18px;
  color: #cbd5e1;
  margin-bottom: 10px;
  line-height: 1.6;
}

.adblock-message .icon {
  font-size: 64px;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.05); }
}

/* Ad Bait for Detection */
.ad-bait {
  width: 1px;
  height: 1px;
  position: absolute;
  top: -9999px;
  left: -9999px;
  opacity: 0;
}

/* ============================================
   VIDEO PLAYER LAYER (Layer 2 - z-index: 100)
   ============================================ */
#video-container {
  position: relative;
  width: 100%;
  height: 100%;
  z-index: 100;
}

/* ============================================
   NATIVE BANNER LAYER (Layer 3 - z-index: 1000)
   ============================================ */
#native-banner-overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1000;
  background: rgba(0, 0, 0, 0.9);
  border-radius: 8px;
  padding: 10px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
  display: none;
  max-width: 90%;
  max-height: 90%;
}

#native-banner-overlay.show {
  display: block;
}

#native-banner-overlay .close-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: #ff4444;
  color: white;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
  transition: all 0.3s ease;
}

#native-banner-overlay .close-btn:hover {
  background: #ff0000;
  transform: scale(1.1);
}

/* ============================================
   SOCIAL BAR LAYERS (Layer 4+ - z-index: 10000+)
   ============================================ */
#social-bar-container-1 {
  position: fixed;
  z-index: 10002;
  transition: all 0.3s ease;
}

#social-bar-container-2 {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10001;
  width: 100%;
  max-width: 728px;
}

/* ============================================
   PIP BUTTON (Hanya muncul saat fullscreen)
   ============================================ */
.plyr__control[data-plyr="pip"] {
  display: none !important;
}

.plyr--fullscreen .plyr__control[data-plyr="pip"] {
  display: inline-flex !important;
  margin-left: 8px !important;
}

/* Fullscreen button di paling kanan */
.plyr__controls {
  display: flex !important;
  flex-wrap: wrap !important;
  justify-content: center !important;
  align-items: center !important;
  gap: 8px !important;
}

.plyr__control[data-plyr="fullscreen"] {
  order: 100 !important;
  margin-left: auto !important;
}

#custom-download-btn {
  order: 99 !important;
}

/* ============================================
   LOADING STATE
   ============================================ */
.loading {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9999;
  text-align: center;
  color: #cbd5e1;
}

.spinner {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(168, 85, 247, 0.2);
  border-top-color: #a855f7;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Hidden class */
.hidden {
  display: none !important;
}

/* Responsive */
@media (max-width: 768px) {
  .adblock-message h2 {
    font-size: 24px;
  }
  
  .adblock-message p {
    font-size: 16px;
  }
  
  .adblock-message .icon {
    font-size: 48px;
  }
  
  #social-bar-container-2 {
    max-width: 95%;
    bottom: 10px;
  }
  
  .plyr__control[data-plyr="fullscreen"] {
    order: 100 !important;
  }
}
</style>
</head>
<body>

<!-- ============================================
     ADBLOCK DETECTION LAYER (Layer 1)
     ============================================ -->
<div class="adblock-message" id="adblockMessage">
  <div class="icon">🚫</div>
  <h2>Matikan AdBlock</h2>
  <p>Untuk melanjutkan menonton</p>
  <p style="font-size: 14px; color: #94a3b8; margin-top: 10px;">
    Disable your ad blocker to watch the video
  </p>
</div>

<!-- Ad Bait for Detection -->
<div class="ad-bait advertisment ad-banner"></div>

<!-- ============================================
     VIDEO PLAYER LAYER (Layer 2)
     ============================================ -->
<div id="video-container" class="hidden">
  <div class="player-wrapper">
    <video id="video-player" playsinline controls controlsList="nodownload" preload="none"></video>
  </div>
</div>

<!-- ============================================
     NATIVE BANNER LAYER (Layer 3)
     ============================================ -->
<div id="native-banner-overlay">
  <button class="close-btn" onclick="closeNativeBanner()">×</button>
  <div id="container-f75b64a3696ffc79b00c3dc18ab09657"></div>
</div>

<!-- ============================================
     SOCIAL BAR LAYER 1 (Random Position)
     ============================================ -->
<div id="social-bar-container-1"></div>

<!-- ============================================
     SOCIAL BAR LAYER 2 (Fixed Bottom)
     ============================================ -->
<div id="social-bar-container-2">
  <script src="https://pl28691838.effectivegatecpm.com/78/fa/46/78fa4651e68597e51185aeb9981ee52a.js"></script>
</div>

<!-- ============================================
     LOADING STATE
     ============================================ -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>Memuat video...</p>
</div>

<!-- ============================================
     LOAD SOCIAL BAR 1 SCRIPT
     ============================================ -->
<script src="https://pl28678333.effectivegatecpm.com/db/75/44/db7544154f97c94944a76a5c9557ed7a.js"></script>

<!-- ============================================
     LOAD NATIVE BANNER SCRIPT
     ============================================ -->
<script async="async" data-cfasync="false" src="https://pl28678360.effectivegatecpm.com/f75b64a3696ffc79b00c3dc18ab09657/invoke.js"></script>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
// ============================================
// CONFIGURATION
// ============================================
const SMARTLINK = "https://www.effectivegatecpm.com/h5jj74n8?key=d0bcbb66f87dc06bac39ce98592d1e02";
const ENCRYPTION_KEY = '112233';

// ============================================
// SMARTLINK CLICK COUNTER SYSTEM
// ============================================
let smartlinkClickCounter = 0;

document.addEventListener('click', (e) => {
  const isPlayerArea = e.target.closest('.plyr') || 
                       e.target.closest('.player-wrapper') ||
                       e.target.closest('.plyr__controls') ||
                       e.target.closest('video') ||
                       e.target.closest('#video-container');
  
  if (isPlayerArea) {
    smartlinkClickCounter++;
    const currentClick = smartlinkClickCounter;
    
    if (currentClick % 3 === 1) {
      window.open(SMARTLINK, '_blank');
      console.log(`🔗 SMARTLINK TRIGGERED (Klik ke-${currentClick})`);
    } else {
      console.log(`🖱️ Klik normal ke-${currentClick} (Aksi: ${e.target.tagName})`);
    }
  }
});

document.addEventListener('DOMContentLoaded', () => {
  const video = document.getElementById('video-player');
  if (video) {
    video.addEventListener('ended', () => {
      console.log('🎬 Video ended - Reset click counter');
      smartlinkClickCounter = 0;
    });
  }
});

// ============================================
// ENHANCED ADBLOCK DETECTION (Runs BEFORE video loads)
// ============================================
function detectAdblock() {
  const bait = document.querySelector('.ad-bait');
  if (!bait) return false;
  
  const rect = bait.getBoundingClientRect();
  const isHidden = rect.height === 0 || 
                   window.getComputedStyle(bait).display === 'none' ||
                   window.getComputedStyle(bait).visibility === 'hidden';
  
  return isHidden;
}

function handleAdblockDetection() {
  const isBlocked = detectAdblock();
  const videoContainer = document.getElementById('video-container');
  const adblockMessage = document.getElementById('adblockMessage');
  const loading = document.getElementById('loading');
  
  if (isBlocked) {
    videoContainer.classList.add('hidden');
    adblockMessage.style.display = 'flex';
    loading.classList.add('hidden');
    console.log('🚫 AdBlock detected: Video hidden');
    
    // Prevent video from loading
    preventVideoLoad();
    return false;
  } else {
    videoContainer.classList.remove('hidden');
    adblockMessage.style.display = 'none';
    loading.classList.add('hidden');
    console.log('✅ No AdBlock: Video visible');
    return true;
  }
}

// ============================================
// LAZY LOADING VIDEO (Load only after adblock check passes)
// ============================================
let videoPlayer = null;
let videoSource = null;
let subSource = null;

function preventVideoLoad() {
  // Remove any video sources
  const video = document.getElementById('video-player');
  if (video) {
    video.pause();
    video.src = '';
    video.load();
  }
}

function loadVideoLazy() {
  const video = document.getElementById('video-player');
  if (!video) return;
  
  console.log('🎬 Lazy loading video...');
  
  // Add video source
  const src = document.createElement('source');
  src.src = videoSource;
  src.type = 'video/mp4';
  video.appendChild(src);
  
  // Add subtitle if exists
  if (subSource) {
    console.log('💬 Adding subtitle...');
    const track = document.createElement('track');
    track.kind = 'subtitles';
    track.src = subSource;
    track.srclang = 'id';
    track.label = 'Bahasa Indonesia';
    track.default = true;
    video.appendChild(track);
  }
  
  // Initialize Plyr
  videoPlayer = new Plyr(video, {
    controls: [
      'play-large','play','rewind','fast-forward',
      'progress','duration','mute',
      'settings','fullscreen','pip'
    ],
    settings: ['speed'],
    speed: { selected: 1, options: [0.5,1,1.5,2,3] },
    disableContextMenu: true,
    autoplay: false,
    muted: true,
    volume: 0.5,
    pip: { enabled: true }
  });
  
  // Add custom download button
  setTimeout(addCustomButton, 100);
  
  // Disable right-click
  video.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    return false;
  });
  
  console.log('✅ Video loaded successfully');
}

function addCustomButton() {
  let controls = document.querySelector('.plyr__controls');
  if (!controls || document.getElementById('custom-download-btn')) return;
  
  const customBtn = document.createElement('button');
  customBtn.id = 'custom-download-btn';
  customBtn.className = 'plyr__controls__item plyr__control';
  customBtn.type = 'button';
  customBtn.setAttribute('data-plyr', 'download');
  customBtn.setAttribute('aria-label', 'Download via Safelink');
  customBtn.title = 'Download via Safelink';
  customBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 13l-4-4h3V3h2v6h3l-4 4zm-7 2h14v2H2v-2z" fill="currentColor"/></svg>';
  
  customBtn.onclick = (e) => {
    e.preventDefault();
    e.stopPropagation();
    console.log('📽 Download button clicked');
    const encoded = btoa(videoSource);
    window.open(`safelink1.html#dl=${encoded}`, '_blank');
  };
  
  const fullscreenBtn = controls.querySelector('.plyr__control--fullscreen');
  if (fullscreenBtn) {
    controls.insertBefore(customBtn, fullscreenBtn);
    console.log('✅ Download button added before fullscreen');
  } else {
    controls.appendChild(customBtn);
  }
}

// ============================================
// DECRYPTION FUNCTION
// ============================================
function decryptUrl(encrypted) {
  try {
    const decoded = atob(encrypted);
    let result = '';
    for (let i = 0; i < decoded.length; i++) {
      result += String.fromCharCode(decoded.charCodeAt(i) ^ ENCRYPTION_KEY.charCodeAt(i % ENCRYPTION_KEY.length));
    }
    return result;
  } catch (e) {
    console.error('❌ Decryption failed:', e.message);
    return null;
  }
}

// ============================================
// MAIN INITIALIZATION (Enhanced with Lazy Loading)
// ============================================
(function() {
  console.log('🚀 Player initialization started...');
  
  // Get URL parameters
  const urlParams = new URLSearchParams(window.location.search);
  const encryptedVideo = urlParams.get('s');
  const encryptedSub = urlParams.get('sub');
  
  if (!encryptedVideo) {
    alert('Video tidak ditemukan!');
    return;
  }
  
  // Decrypt URLs FIRST
  videoSource = decryptUrl(encryptedVideo);
  subSource = encryptedSub ? decryptUrl(encryptedSub) : null;
  
  if (!videoSource) {
    alert('Link video rusak!');
    return;
  }
  
  console.log('✅ URLs decrypted successfully');
  
  // IMMEDIATE ADBLOCK DETECTION (Before video loads)
  setTimeout(() => {
    const adblockDetected = handleAdblockDetection();
    
    if (!adblockDetected) {
      console.log('❌ AdBlock active - Video will NOT load');
      return;
    }
    
    // ONLY LOAD VIDEO IF NO ADBLOCK
    console.log('✅ No AdBlock detected - Loading video...');
    loadVideoLazy();
    
  }, 100); // Small delay to ensure DOM is ready
  
})();

// ============================================
// SOCIAL BAR & NATIVE BANNER FUNCTIONS
// ============================================

function setRandomSocialBarPosition() {
  const container = document.getElementById('social-bar-container-1');
  if (!container) return;
  
  const position = Math.floor(Math.random() * 4);
  
  container.style.top = '';
  container.style.bottom = '';
  container.style.left = '';
  container.style.right = '';
  container.style.width = 'auto';
  container.style.height = 'auto';
  
  switch(position) {
    case 0: // Top
      container.style.top = '10px';
      container.style.left = '50%';
      container.style.transform = 'translateX(-50%)';
      container.style.width = '100%';
      break;
    case 1: // Bottom (avoid conflict)
      container.style.top = '10px';
      container.style.left = '50%';
      container.style.transform = 'translateX(-50%)';
      container.style.width = '100%';
      break;
    case 2: // Left
      container.style.left = '10px';
      container.style.top = '50%';
      container.style.transform = 'translateY(-50%)';
      container.style.height = '100%';
      break;
    case 3: // Right
      container.style.right = '10px';
      container.style.top = '50%';
      container.style.transform = 'translateY(-50%)';
      container.style.height = '100%';
      break;
  }
}

function closeNativeBanner() {
  const overlay = document.getElementById('native-banner-overlay');
  if (overlay) overlay.classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  const video = document.getElementById('video-player');
  if (video) {
    video.addEventListener('play', () => {
      document.getElementById('native-banner-overlay')?.classList.remove('show');
    });
    
    video.addEventListener('pause', () => {
      document.getElementById('native-banner-overlay')?.classList.add('show');
    });
  }
});

setTimeout(setRandomSocialBarPosition, 500);

// ============================================
// RECHECK ADBLOCK ON WINDOW FOCUS
// ============================================
window.addEventListener('focus', () => {
  setTimeout(() => {
    const adblockDetected = handleAdblockDetection();
    if (adblockDetected && !videoPlayer) {
      loadVideoLazy();
    }
  }, 300);
});
</script>

</body>
</html>
